name: scomcp_stage3_joint
# Stage 3 (paper Algorithm 1): joint end-to-end fine-tuning of the WHOLE network
# over the Rayleigh fading channel.  Nothing frozen.  Loss = Lper (no MSE term).
root_dir: '/home/josh/cooperative_semantic_perception/OpenCOOD/opv2v_data_dumping/train'
validate_dir: '/home/josh/cooperative_semantic_perception/OpenCOOD/opv2v_data_dumping/validate'

yaml_parser: 'load_point_pillar_params'
train_params:
  batch_size: &batch_size 1
  epoches: &epoches 20
  eval_freq: 1
  save_freq: 1
  max_cav: &max_cav 5

scomcp_train:
  rec_loss_weight: 0.0          # gamma: stage 3 uses Lper only (paper eq. 21)

fusion:
  core_method: 'IntermediateFusionDataset'
  args: [ ]

preprocess:
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: &voxel_size [ 0.4, 0.4, 4 ]
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000
  cav_lidar_range: &cav_lidar [ -140.8, -38.4, -3, 140.8, 38.4, 1 ]

data_augment:
  - NAME: random_world_flip
    ALONG_AXIS_LIST: [ 'x' ]
  - NAME: random_world_rotation
    WORLD_ROT_ANGLE: [ -0.78539816, 0.78539816 ]
  - NAME: random_world_scaling
    WORLD_SCALE_RANGE: [ 0.95, 1.05 ]

postprocess:
  core_method: 'VoxelPostprocessor'
  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 3.9
    w: 1.6
    h: 1.56
    r: [ 0, 90 ]
    num: &achor_num 2
    feature_stride: 4
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.2
  order: 'hwl'
  max_num: 100
  nms_thresh: 0.15

model:
  core_method: point_pillar_importance_map_jscc
  args:
    voxel_size: *voxel_size
    lidar_range: *cav_lidar
    anchor_number: *achor_num
    head_dim: 256
    max_cav: *max_cav
    compression: 0
    backbone_fix: False
    freeze: [ ]                  # stage 3: joint, nothing frozen
    pillar_vfe:
      use_norm: True
      with_distance: False
      use_absolute_xyz: True
      num_filters: [ 64 ]
    point_pillar_scatter:
      num_features: 64
    base_bev_backbone:
      layer_nums: &layer_nums [ 3, 5, 8 ]
      layer_strides: [ 2, 2, 2 ]
      num_filters: &num_filters [ 64, 128, 256 ]
      upsample_strides: [ 1, 2, 4 ]
      num_upsample_filter: [ 128, 128, 128 ]
    shrink_header:
      kernal_size: [ 3 ]
      stride: [ 2 ]
      padding: [ 1 ]
      dim: [ 256 ]
      input_dim: 384
    where2comm_fusion:
      variant: scomcp
      fully: False
      voxel_size: *voxel_size
      downsample_rate: 4
      in_channels: 256
      multi_scale: True
      layer_nums: *layer_nums
      num_filters: *num_filters
      communication:
        round: 1
        threshold: 0.01
        gaussian_smooth:
          k_size: 5
          c_sigma: 1.0
      jscc:
        cr: 0.005
        snr_db: 10.0
        latent_dim: 64
        c_complex: 64
        channel_type: rayleigh
        importance_source: learned
        use_psm_importance: False
        mask_mode: topk
        comm_threshold: 0.01
        train_snr_low: 0.0
        train_snr_high: 20.0
        scomcp:
          attn_dim: 64
          ctx_size: 16
          codec_hidden: 128
          codec_depth: 2
          codec_heads: 4

loss:
  core_method: point_pillar_loss
  args:
    cls_weight: 1.0
    reg: 2.0

optimizer:
  core_method: Adam
  lr: 2e-4
  args:
    eps: 1e-10
    weight_decay: 1e-2

lr_scheduler:
  core_method: cosineannealwarm
  epoches: *epoches
  warmup_lr: 2e-5
  warmup_epoches: 3
  lr_min: 5e-6
